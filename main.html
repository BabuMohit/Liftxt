<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carousel Agent</title>
  <link rel="stylesheet" href="main.css" />
</head>
<body>
  <div class="app-wrapper">

    <!-- Left Panel: Preview -->
    <div class="panel panel-preview" id="previewPanel">
      <div class="panel-header">
        <span class="panel-title">Preview</span>
        <span class="preview-dims" id="previewDims"></span>
      </div>
      <div class="preview-scroll-area" id="previewScrollArea">
        <div class="preview-placeholder" id="previewPlaceholder">
          <div class="placeholder-icon">&#128247;</div>
          <p>Capture a page to see the preview here</p>
        </div>
        <div class="preview-container hidden" id="previewContainer">
          <img class="preview-image" id="previewImage" alt="Page Screenshot" />
        </div>
      </div>
    </div>

    <!-- Right Panel: Controls -->
    <div class="panel panel-controls">
      <div class="controls-header">
        <div class="logo-row">
          <div class="logo-icon">C</div>
          <h1 class="logo-text">Carousel Agent</h1>
        </div>
        <p class="tagline">Full-page screenshot &amp; HTML capture</p>
      </div>

      <div class="controls-body">
        <label class="input-label" for="urlInput">Target URL</label>
        <input
          type="url"
          id="urlInput"
          class="url-input"
          placeholder="https://example.com"
          autocomplete="off"
          spellcheck="false"
        />

        <div class="btn-group">
          <button class="btn btn-primary" id="captureBtn">
            <span class="btn-icon">&#9654;</span>
            Capture
          </button>
          <button class="btn btn-secondary" id="findCaptureBtn">
            <span class="btn-icon">&#128269;</span>
            Find &amp; Capture
          </button>
        </div>

        <button class="btn btn-ghost" id="viewHtmlBtn" disabled>
          <span class="btn-icon">&#60;/&#62;</span>
          View HTML
        </button>

        <div class="status-box" id="statusBox">
          <div class="status-indicator" id="statusIndicator"></div>
          <span class="status-text" id="statusText">Ready</span>
        </div>

        <div class="search-section" id="searchSection">
          <div class="search-divider"></div>
          <label class="input-label" for="searchInput">Search</label>
          <div class="search-input-wrap">
            <span class="search-icon">&#128269;</span>
            <input
              type="text"
              id="searchInput"
              class="url-input search-input"
              placeholder="Search text in screenshot…"
              autocomplete="off"
              spellcheck="false"
              disabled
            />
          </div>
          <div class="search-controls">
            <span class="search-counter" id="searchCounter">0 results</span>
            <div class="search-nav">
              <button class="search-nav-btn" id="prevMatchBtn" disabled title="Previous match">&#8593;</button>
              <button class="search-nav-btn" id="nextMatchBtn" disabled title="Next match">&#8595;</button>
            </div>
          </div>
        </div>
      </div>

      <div class="controls-footer">
        <p class="footer-note">Screenshots are captured in full-page mode using the Chrome Debugger API.</p>
      </div>
    </div>
  </div>

  <!-- HTML Viewer Modal -->
  <div class="modal-overlay hidden" id="htmlModal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">Page HTML Source</span>
        <div class="modal-actions">
          <button class="modal-btn" id="copyHtmlBtn" title="Copy to clipboard">Copy</button>
          <button class="modal-close" id="closeModalBtn" title="Close">&times;</button>
        </div>
      </div>
      <div class="modal-body">
        <pre class="html-code" id="htmlCode"></pre>
      </div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
